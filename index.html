<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="image_14fcbc.png?v=final">
    <link rel="apple-touch-icon" sizes="120x120" href="image_14fcbc.png?v=final">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>YouTube</title>
    <style>
        /* 基本レイアウト */
        body { background: #f1f1f1; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 52px; padding-bottom: 50px; }
        .header { position: fixed; top: 0; width: 100%; height: 52px; background: #fff; border-bottom: 1px solid #e2e2e2; z-index: 10000; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; }
        .logo-img { height: 22px; }

        /* 動画リスト */
        .video-item { background: #fff; border-bottom: 8px solid #f1f1f1; }
        .thumb-cont { width: 100%; position: relative; padding-top: 56.25%; background: #000; }
        .thumb-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .v-detail { padding: 12px; display: flex; }
        .v-avatar { width: 36px; height: 36px; border-radius: 18px; margin-right: 12px; background: #eee; flex-shrink: 0; }
        .v-title { font-size: 14px; font-weight: bold; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { font-size: 12px; color: #606060; margin-top: 4px; }

        /* フルページ（再生/チャンネル） */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 20000; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .ch-header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; background: #fafafa; }
        .ch-avatar { width: 60px; height: 60px; border-radius: 30px; background: #ccc; margin: 0 auto 10px; }
        
        /* 再生画面のアクションバー */
        .action-bar { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid #eee; }
        .action-btn { display: flex; flex-direction: column; align-items: center; color: #606060; font-size: 10px; }
        .action-btn .material-icons-outlined { font-size: 22px; margin-bottom: 4px; }

        /* タブバー */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #fff; border-top: 1px solid #d2d2d2; display: flex; z-index: 30000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #606060; font-size: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="location.reload()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo-img"></div>
    <span class="material-icons-outlined" style="font-size:24px;" onclick="doSearch()">search</span>
</div>

<div id="main-view"></div>

<div id="channel-page" class="full-page">
    <div class="ch-header">
        <div class="ch-avatar"></div>
        <h2 id="ch-name" style="margin:0; font-size:18px;"></h2>
        <div style="background:#cc0000; color:#fff; padding:6px 15px; border-radius:2px; display:inline-block; margin-top:10px; font-size:13px; font-weight:bold;">チャンネル登録</div>
    </div>
    <div id="ch-video-list"></div>
    <div style="padding:25px; text-align:center; color:#065fd4; font-weight:bold; border-top:1px solid #eee;" onclick="closeChannel()">✕ 閉じる</div>
</div>

<div id="player-page" class="full-page">
    <div id="yt-player-cont" style="width:100%; aspect-ratio:16/9; background:#000;"></div>
    <div style="padding:12px;">
        <p id="p-title" style="font-size:16px; font-weight:bold; margin:0;"></p>
        <div style="display:flex; align-items:center; margin-top:15px; padding:10px 0; border-top:1px solid #eee; border-bottom:1px solid #eee;" id="p-ch-info"></div>
    </div>
    
    <div class="action-bar">
        <div class="action-btn"><span class="material-icons-outlined">thumb_up</span><span>1.2万</span></div>
        <div class="action-btn"><span class="material-icons-outlined">thumb_down</span><span>低評価</span></div>
        <div class="action-btn"><span class="material-icons-outlined">reply</span><span>共有</span></div>
        <div class="action-btn"><span class="material-icons-outlined">playlist_add</span><span>保存</span></div>
    </div>

    <div id="real-comments" style="padding:12px;"></div>
    <div style="padding:30px; text-align:center; color:#065fd4; font-weight:bold;" onclick="closePlayer()">✕ プレイヤーを閉じる</div>
</div>

<div class="tab-bar">
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">home</span><span>ホーム</span></div>
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">local_fire_department</span><span>急上昇</span></div>
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">video_library</span><span>ライブラリ</span></div>
</div>

<script>
    var KEY = 'AIzaSyBGxeOnslbgSvN2JWq8o2tNptSFzSaY8lI';

    function ajaxGet(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) { callback(JSON.parse(xhr.responseText)); }
        };
        xhr.send();
    }

    function renderList(url, targetId) {
        var target = document.getElementById(targetId);
        target.innerHTML = '<div style="padding:20px; text-align:center;">読み込み中...</div>';
        ajaxGet(url, function(data) {
            var html = '';
            for (var i = 0; i < data.items.length; i++) {
                var v = data.items[i];
                var videoId = v.id.videoId || (v.snippet.resourceId ? v.snippet.resourceId.videoId : null);
                if(!videoId) continue;
                var title = v.snippet.title.replace(/'/g, "");
                var chId = v.snippet.channelId;
                var chName = v.snippet.channelTitle.replace(/'/g, "");
                
                html += '<div class="video-item">' +
                        '<div class="thumb-cont" onclick="openPlayer(\''+videoId+'\',\''+title+'\',\''+chId+'\',\''+chName+'\')"><img src="'+v.snippet.thumbnails.high.url+'" class="thumb-img"></div>' +
                        '<div class="v-detail">' +
                        '<div class="v-avatar" onclick="openChannel(\''+chId+'\',\''+chName+'\')"></div>' +
                        '<div onclick="openPlayer(\''+videoId+'\',\''+title+'\',\''+chId+'\',\''+chName+'\')">' +
                        '<p class="v-title">'+v.snippet.title+'</p>' +
                        '<p class="v-meta">'+v.snippet.channelTitle+'</p></div></div></div>';
            }
            target.innerHTML = html;
        });
    }

    function doSearch() {
        var q = prompt("YouTube 検索");
        if (q) renderList('https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + encodeURIComponent(q) + '&type=video&maxResults=10&key=' + KEY, 'main-view');
    }

    function openChannel(chId, chName) {
        document.getElementById('channel-page').style.display = 'block';
        document.getElementById('ch-name').innerText = chName;
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&channelId='+chId+'&order=date&type=video&maxResults=10&key='+KEY;
        renderList(url, 'ch-video-list');
    }

    function openPlayer(id, title, chId, chName) {
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('p-title').innerText = title;
        // プレイヤー下のチャンネル情報
        document.getElementById('p-ch-info').innerHTML = 
            '<div class="v-avatar" onclick="openChannel(\''+chId+'\',\''+chName+'\')"></div>' +
            '<div style="flex:1;" onclick="openChannel(\''+chId+'\',\''+chName+'\')">' +
            '<p style="margin:0; font-size:14px; font-weight:bold;">'+chName+'</p>' +
            '<p style="margin:2px 0 0; font-size:11px; color:#606060;">チャンネルを表示</p></div>' +
            '<div style="color:#cc0000; font-size:13px; font-weight:bold;">登録</div>';
        
        var embedUrl = 'https://www.youtube.com/embed/' + id + '?autoplay=1&html5=1&playsinline=1';
        document.getElementById('yt-player-cont').innerHTML = '<iframe src="'+embedUrl+'" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>';
        
        // リアルコメント取得
        var cmtUrl = 'https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId='+id+'&maxResults=5&key='+KEY;
        ajaxGet(cmtUrl, function(data) {
            var html = '<p style="font-size:14px; font-weight:bold; border-top:1px solid #eee; padding-top:10px;">コメント</p>';
            if(data.items) {
                for (var i = 0; i < data.items.length; i++) {
                    var c = data.items[i].snippet.topLevelComment.snippet;
                    html += '<div style="font-size:13px; margin-bottom:12px;"><b>'+c.authorDisplayName+'</b><br>'+c.textDisplay+'</div>';
                }
            }
            document.getElementById('real-comments').innerHTML = html;
        });
    }

    function closeChannel() { document.getElementById('channel-page').style.display = 'none'; }
    function closePlayer() { document.getElementById('player-page').style.display = 'none'; document.getElementById('yt-player-cont').innerHTML = ''; }
    function loadHome() { renderList('https://www.googleapis.com/youtube/v3/search?part=snippet&q='+encodeURIComponent('ゆっくり実況')+'&type=video&maxResults=10&key='+KEY, 'main-view'); }

    window.onload = loadHome;
</script>
</body>
</html>
