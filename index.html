<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image_14fcbc.png">
    <title>soumano Home</title>
    <style>
        body { 
            background: #000; 
            background-image: linear-gradient(to bottom, #1a1a1a, #000);
            font-family: "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            color: #fff;
            overflow: hidden;
        }
        
        .status-bar { height: 20px; width: 100%; background: rgba(0,0,0,0.5); }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 4sの幅に合わせて3列 */
            gap: 20px;
            padding: 30px 15px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        .app-icon-box {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* アプリごとの色設定 */
        .yt-color { background: linear-gradient(135deg, #ff0000, #cc0000); }
        .tw-color { background: linear-gradient(135deg, #1DA1F2, #0d8bd9); }
        .ic-color { background: linear-gradient(135deg, #fff, #e0e0e0); color: #000; }
        .st-color { background: linear-gradient(135deg, #8e8e93, #636366); }

        .app-label {
            font-size: 11px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .app-item:active .app-icon-box {
            opacity: 0.7;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="status-bar"></div>

<div class="app-grid">
    <a href="old.html" class="app-item">
        <div class="app-icon-box yt-color">📺</div>
        <span class="app-label">YouTube</span>
    </a>

    <a href="twitter.html" class="app-item">
        <div class="app-icon-box tw-color">🐦</div>
        <span class="app-label">Twitter</span>
    </a>

    <a href="cloud.html" class="app-item">
        <div class="app-icon-box ic-color">☁️</div>
        <span class="app-label">iCloud</span>
    </a>

    <a href="#" class="app-item" onclick="location.reload()">
        <div class="app-icon-box st-color">🔄</div>
        <span class="app-label">Reload</span>
    </a>
</div>

</body>
</html>
