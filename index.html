<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="YouTube">
    <link rel="apple-touch-icon" href="youtube-play.jpg">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <title>YouTube</title>
    <style>
        body { background: #f1f1f1; font-family: "Helvetica Neue", Helvetica, sans-serif; margin: 0; padding-top: 52px; padding-bottom: 50px; -webkit-tap-highlight-color: transparent; }
        
        /* ヘッダー */
        .header { position: fixed; top: 0; width: 100%; height: 52px; background: #fff; border-bottom: 1px solid #e2e2e2; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; }
        .logo-img { height: 22px; }
        .search-icon { font-size: 24px; color: #030303; cursor: pointer; }

        /* 動画リスト */
        .video-item { background: #fff; border-bottom: 8px solid #f1f1f1; }
        .thumb-cont { width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        .v-detail { padding: 12px; display: flex; }
        .v-avatar { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; background: #eee; overflow: hidden; }
        .v-avatar img { width: 100%; height: 100%; }
        .v-title { font-size: 14px; color: #111; font-weight: bold; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { font-size: 12px; color: #606060; margin-top: 4px; }

        /* エラー画面 */
        .error-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 20px; text-align: center; color: #606060; }
        .error-icon { width: 80px; height: 80px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .error-icon::after { content: "!"; font-size: 45px; color: #fff; font-weight: bold; }
        .error-text { font-size: 20px; color: #666; margin-bottom: 8px; }
        .error-sub { font-size: 16px; color: #999; }

        /* 全画面プレイヤー */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 2100; }

        /* タブバー */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 50px; background: #fff; border-top: 1px solid #d2d2d2; display: flex; z-index: 3000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #606060; font-size: 10px; cursor: pointer; }
        .tab-item .material-icons-outlined { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="location.reload()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo-img"></div>
    <span class="material-icons-outlined search-icon" onclick="showSearch()">search</span>
</div>

<div id="main-view"></div>

<div id="player-page" class="full-page">
    <div id="yt-player-cont" class="video-box"></div>
    <div style="padding:15px; border-bottom:1px solid #eee;">
        <p id="p-title" style="font-size:16px; margin:0; font-weight:bold;"></p>
        <p id="p-views" class="v-meta"></p>
    </div>
    <div style="padding:40px; text-align:center; color:#888;" onclick="closePlayer()">✕ プレイヤーを閉じる</div>
</div>

<div class="tab-bar">
    <div class="tab-item" onclick="loadHome()">
        <span class="material-icons-outlined">home</span>
        <span>ホーム</span>
    </div>
    <div class="tab-item" onclick="loadHome()">
        <span class="material-icons-outlined">local_fire_department</span>
        <span>急上昇</span>
    </div>
    <div class="tab-item" onclick="loadHome()">
        <span class="material-icons-outlined">video_library</span>
        <span>ライブラリ</span>
    </div>
</div>

<script>
    const KEY = 'AIzaSyA46GQprT1Cc0kmqLGHYn2fqHMspIxzRlE';
    const keywords = ['ゲーム実況', 'Minecraft', 'Fortnite', 'ゆっくり実況', '料理'];

    function renderError(targetId) {
        const container = document.getElementById(targetId);
        container.innerHTML = `
            <div class="error-container" onclick="location.reload()">
                <div class="error-icon"></div>
                <div class="error-text">読み込みエラー</div>
                <div class="error-sub">再試行するにはタップしてください</div>
            </div>`;
    }

    async function fetchFull(path) {
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${KEY}`);
            const data = await res.json();
            if (data.error) return "API_LIMIT"; 
            if (!data.items || data.items.length === 0) return [];

            const ids = data.items.map(i => i.id.videoId || i.id).join(',');
            const detail = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${ids}&key=${KEY}`);
            return (await detail.json()).items || [];
        } catch (e) {
            return "NETWORK_ERROR";
        }
    }

    function renderList(items, targetId) {
        const container = document.getElementById(targetId);
        container.innerHTML = items.map(v => `
            <div class="video-item" onclick="openPlayer('${v.id}')">
                <div class="thumb-cont"><img src="${v.snippet.thumbnails.high.url}" class="thumb-img"></div>
                <div class="v-detail">
                    <div class="v-avatar"><img src="${v.snippet.thumbnails.default.url}"></div>
                    <div>
                        <p class="v-title">${v.snippet.title}</p>
                        <p class="v-meta">${v.snippet.channelTitle} • ${parseInt(v.statistics.viewCount).toLocaleString()}回</p>
                    </div>
                </div>
            </div>`).join('');
    }

    async function loadHome() {
        closePlayer();
        const mainView = document.getElementById('main-view');
        mainView.innerHTML = '<div style="padding:20px; text-align:center;">読み込み中...</div>';

        const q = keywords[Math.floor(Math.random() * keywords.length)];
        const vids = await fetchFull(`search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=10&regionCode=JP`);
        
        if (vids === "API_LIMIT" || vids === "NETWORK_ERROR") {
            renderError('main-view');
        } else {
            renderList(vids, 'main-view');
        }
    }

    async function openPlayer(id) {
        const pPage = document.getElementById('player-page');
        pPage.style.display = 'block';
        pPage.scrollTop = 0;

        const vData = await fetchFull(`videos?part=snippet,statistics&id=${id}`);
        if (vData === "API_LIMIT") {
            renderError('player-page');
            return;
        }
        
        const v = vData[0];
        document.getElementById('p-title').innerText = v.snippet.title;
        document.getElementById('p-views').innerText = parseInt(v.statistics.viewCount).toLocaleString() + " 回視聴";
        document.getElementById('yt-player-cont').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
    }

    function closePlayer() { document.getElementById('player-page').style.display='none'; document.getElementById('yt-player-cont').innerHTML=''; }
    function showSearch() { const q = prompt("YouTube 検索"); if(q) execSearch(q); }
    async function execSearch(q) {
        closePlayer();
        const vids = await fetchFull(`search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=10`);
        if (vids === "API_LIMIT") renderError('main-view');
        else renderList(vids, 'main-view');
    }

    window.onload = loadHome;
</script>
</body>
</html>
