<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="image_14fcbc.png?v=fixed_final">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>YouTube iOS 9 Style</title>
    <style>
        :root { --bg: #f1f1f1; --surface: #fff; --text: #000; --border: #e2e2e2; --yt-red: #cc0000; --meta: #606060; }
        body.dark { --bg: #0f0f0f; --surface: #1a1a1a; --text: #fff; --border: #333; --meta: #aaa; }
        
        body { background: var(--bg); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 52px; padding-bottom: 50px; color: var(--text); overflow-x: hidden; transition: background 0.3s; }
        
        /* ヘッダー */
        .header { position: fixed; top: 0; width: 100%; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 50000; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; }
        .logo-img { height: 20px; cursor: pointer; }
        .header-icons { display: flex; gap: 18px; align-items: center; }
        .material-icons { color: #888; font-size: 26px; cursor: pointer; }
        body.dark .material-icons { color: #fff; }

        /* 動画リスト */
        .video-item { background: var(--surface); border-bottom: 8px solid var(--bg); cursor: pointer; }
        .thumb-cont { width: 100%; position: relative; padding-top: 56.25%; background: #000; }
        .thumb-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .v-detail { padding: 12px; display: flex; }
        .v-avatar { width: 36px; height: 36px; border-radius: 18px; margin-right: 12px; background: #eee; flex-shrink: 0; overflow: hidden; }
        .v-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .v-title { font-size: 14px; font-weight: bold; margin: 0 0 4px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { font-size: 12px; color: var(--meta); }

        /* プレイヤー & コメント */
        #player-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 50px); background: var(--bg); z-index: 60000; overflow-y: auto; }
        .p-info-area { padding: 12px; background: var(--surface); }
        
        .p-action-bar { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); background: var(--surface); }
        .action-item { display: flex; flex-direction: column; align-items: center; color: var(--meta); font-size: 10px; cursor: pointer; }
        .action-item .material-icons { font-size: 24px; margin-bottom: 2px; }

        .p-ch-section { display: flex; align-items: center; justify-content: space-between; padding: 15px 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); cursor: pointer; }
        
        .comment-row { display: flex; padding: 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
        .comment-avatar { width: 32px; height: 32px; border-radius: 16px; background: #ddd; margin-right: 12px; flex-shrink: 0; overflow: hidden; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .comment-body { flex: 1; }
        
        .comment-actions { display: flex; align-items: center; gap: 20px; margin-top: 10px; color: var(--meta); }
        .comment-actions .material-icons { font-size: 16px; cursor: pointer; }
        .comment-actions span { font-size: 11px; margin-left: -15px; }

        .full-page { display: none; position: fixed; top: 52px; left: 0; width: 100%; height: calc(100% - 102px); background: var(--bg); z-index: 20000; overflow-y: auto; }
        .ch-info-area { padding: 20px 15px; background: var(--surface); border-bottom: 1px solid var(--border); text-align: center; }
        .ch-big-avatar { width: 80px; height: 80px; border-radius: 40px; background: #eee; margin: -60px auto 10px; border: 4px solid var(--surface); object-fit: cover; }

        .sub-btn { background: var(--yt-red); color: #fff; padding: 8px 18px; border-radius: 2px; font-size: 13px; font-weight: bold; border: none; }
        .sub-btn.done { background: #eee; color: #606060; }

        /* 🆕 タブバー修正: iPhone 4sの幅に対応 */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 70000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--meta); cursor: pointer; overflow: hidden; }
        .tab-item .material-icons { font-size: 24px; margin-bottom: 1px; } /* アイコンサイズを微調整 */
        .tab-item span { font-size: 9px; white-space: nowrap; transform: scale(0.9); } /* 文字を少し小さく、1行に固定 */

        .section-label { padding: 10px; font-size: 14px; font-weight: bold; color: var(--meta); background: var(--bg); border-top: 1px solid var(--border); }
    </style>
</head>
<body id="main-body">

<div class="header">
    <div onclick="goHome()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo-img"></div>
    <div class="header-icons">
        <span class="material-icons" onclick="alert('デバイス未検出')">cast</span>
        <span class="material-icons" onclick="doSearch()">search</span>
        <span class="material-icons">account_circle</span>
    </div>
</div>

<div id="main-view"></div>

<div id="channel-page" class="full-page">
    <div id="ch-banner" style="height:120px; background:#ccc; background-size:cover;"></div>
    <div class="ch-info-area">
        <img id="ch-icon-img" class="ch-big-avatar">
        <div class="ch-details">
            <h2 id="ch-name-main" style="margin:0;"></h2>
            <p id="ch-subs-count" style="font-size:12px; color:var(--meta);"></p>
            <button class="sub-btn" onclick="toggleSub(this)">登録する</button>
        </div>
    </div>
    <div id="ch-video-list"></div>
</div>

<div id="player-page">
    <div style="position:sticky; top:0; z-index:20001; background:#000;">
        <div id="yt-player-cont" style="width:100%; aspect-ratio:16/9;"></div>
    </div>
    <div class="p-info-area">
        <p id="p-title" style="font-size:16px; font-weight:bold; margin:0;"></p>
        <p id="p-views" style="font-size:12px; color:var(--meta); margin:8px 0;"></p>
        
        <div class="p-action-bar">
            <div class="action-item"><span class="material-icons">thumb_up</span><span>高評価</span></div>
            <div class="action-item"><span class="material-icons">thumb_down</span><span>低評価</span></div>
            <div class="action-item"><span class="material-icons">share</span><span>共有</span></div>
            <div class="action-item" onclick="closePlayer()"><span class="material-icons">expand_more</span><span>閉じる</span></div>
        </div>
    </div>
    <div class="p-ch-section" id="p-ch-click">
        <div style="display:flex; align-items:center;"><div class="v-avatar" id="p-ch-icon"></div><div id="p-ch-name" style="font-size:14px; font-weight:bold;"></div></div>
        <button class="sub-btn" onclick="event.stopPropagation(); toggleSub(this)">登録する</button>
    </div>
    <div class="section-label">次の動画</div>
    <div id="next-videos-list"></div>
    <div class="section-label">コメント</div>
    <div id="real-comments"></div>
</div>

<div class="tab-bar">
    <div class="tab-item" onclick="goHome()"><span class="material-icons">home</span><span>ホーム</span></div>
    <div class="tab-item" onclick="loadHome()"><span class="material-icons">local_fire_department</span><span>人気</span></div>
    <div class="tab-item" onclick="alert('登録済みはありません')"><span class="material-icons">subscriptions</span><span>登録済</span></div>
    <div class="tab-item" onclick="alert('通知はありません')"><span class="material-icons">notifications</span><span>通知</span></div>
    <div class="tab-item" onclick="alert('ライブラリを表示')"><span class="material-icons">folder</span><span>ライブラリ</span></div>
</div>

<script>
    var KEY = 'AIzaSyBGxeOnslbgSvN2JWq8o2tNptSFzSaY8lI';
    var cachedItems = [];

    function goHome() { closeChannel(); closePlayer(); loadHome(); }
    function toggleSub(btn) { btn.innerText = (btn.innerText === "登録する") ? "登録済み" : "登録する"; btn.classList.toggle('done'); }
    function closePlayer() { document.getElementById('player-page').style.display = 'none'; document.getElementById('yt-player-cont').innerHTML = ''; }
    function closeChannel() { document.getElementById('channel-page').style.display = 'none'; }

    function ajaxGet(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) callback(JSON.parse(xhr.responseText));
        };
        xhr.send();
    }

    function formatViews(num) {
        num = parseInt(num);
        if (num >= 10000) return (num / 10000).toFixed(1) + "万回";
        return num + "回";
    }

    function loadHome() {
        renderList(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&maxResults=20&key=${KEY}`, 'main-view', true, true);
    }

    function renderList(url, targetId, isVideoAPI, shouldCache) {
        ajaxGet(url, function(data) {
            if(shouldCache) cachedItems = data.items.concat(cachedItems).slice(0, 40);
            var html = '';
            data.items.forEach(v => {
                var vid = isVideoAPI ? v.id : v.id.videoId;
                if(!vid) return;
                var views = v.statistics ? formatViews(v.statistics.viewCount) : "";
                html += `<div class="video-item" onclick="openPlayer('${vid}')">
                    <div class="thumb-cont"><img src="${v.snippet.thumbnails.high.url}" class="thumb-img"></div>
                    <div class="v-detail">
                        <div class="v-avatar" onclick="event.stopPropagation(); openChannel('${v.snippet.channelId}')"><img src="${v.snippet.thumbnails.default.url}"></div>
                        <div><p class="v-title">${v.snippet.title}</p><p class="v-meta">${v.snippet.channelTitle} ・ ${views}</p></div>
                    </div></div>`;
            });
            document.getElementById(targetId).innerHTML = html;
        });
    }

    function openPlayer(id) {
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('player-page').scrollTop = 0;
        document.getElementById('yt-player-cont').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
        
        ajaxGet(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=${KEY}`, function(data) {
            var v = data.items[0];
            document.getElementById('p-title').innerText = v.snippet.title;
            document.getElementById('p-views').innerText = formatViews(v.statistics.viewCount) + " 視聴";
            document.getElementById('p-ch-name').innerText = v.snippet.channelTitle;
            document.getElementById('p-ch-click').onclick = function() { openChannel(v.snippet.channelId); };
            ajaxGet(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${v.snippet.channelId}&key=${KEY}`, function(chData) {
                document.getElementById('p-ch-icon').innerHTML = `<img src="${chData.items[0].snippet.thumbnails.default.url}">`;
            });
        });

        var nextHtml = '';
        cachedItems.sort(() => 0.5 - Math.random()).slice(0, 6).forEach(item => {
            var vid = item.id.videoId || item.id;
            nextHtml += `<div class="video-item" style="display:flex; padding:10px; border-bottom:1px solid var(--border);" onclick="openPlayer('${vid}')">
                <img src="${item.snippet.thumbnails.medium.url}" style="width:120px; aspect-ratio:16/9; object-fit:cover; margin-right:10px; border-radius:4px;">
                <div style="flex:1;"><div class="v-title" style="font-size:12px;">${item.snippet.title}</div><div class="v-meta" style="font-size:10px;">${item.snippet.channelTitle}</div></div></div>`;
        });
        document.getElementById('next-videos-list').innerHTML = nextHtml;
        loadComments(id);
    }

    function loadComments(id) {
        ajaxGet(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${id}&maxResults=5&key=${KEY}`, function(data) {
            var html = '';
            if(data.items) {
                data.items.forEach(item => {
                    var c = item.snippet.topLevelComment.snippet;
                    html += `<div class="comment-row">
                        <div class="comment-avatar"><img src="${c.authorProfileImageUrl}"></div>
                        <div class="comment-body">
                            <div style="font-size:12px;font-weight:bold;">${c.authorDisplayName}</div>
                            <div style="font-size:13px; margin-top:4px;">${c.textDisplay}</div>
                            <div class="comment-actions">
                                <span class="material-icons">thumb_up</span><span>${c.likeCount || ''}</span>
                                <span class="material-icons">thumb_down</span>
                                <span class="material-icons">chat_bubble_outline</span>
                                <span class="material-icons">more_vert</span>
                            </div>
                        </div></div>`;
                });
            }
            document.getElementById('real-comments').innerHTML = html || '<div class="info-msg">コメントはオフになっています</div>';
        });
    }

    function openChannel(id) {
        closePlayer();
        document.getElementById('channel-page').style.display = 'block';
        ajaxGet(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${id}&key=${KEY}`, function(data) {
            var ch = data.items[0];
            document.getElementById('ch-name-main').innerText = ch.snippet.title;
            document.getElementById('ch-icon-img').src = ch.snippet.thumbnails.medium.url;
            document.getElementById('ch-subs-count').innerText = "登録者数 " + formatViews(ch.statistics.subscriberCount);
            renderList(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${id}&type=video&maxResults=10&key=${KEY}`, 'ch-video-list', false, false);
        });
    }

    function doSearch() {
        var q = prompt("YouTube 検索");
        if(q) renderList(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=15&key=${KEY}`, 'main-view', false, true);
    }

    window.onload = loadHome;
</script>
</body>
</html>
