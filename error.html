<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="image_14fcbc.png">
    
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>YouTube</title>
    <style>
        body { background: #f1f1f1; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 52px; padding-bottom: 50px; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 52px; background: #fff; border-bottom: 1px solid #e2e2e2; z-index: 10000; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; }
        .logo-img { height: 18px; }
        
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 102px);
            text-align: center;
            color: #606060;
            background: #f1f1f1;
            cursor: pointer;
            padding-bottom: 25%;
        }
        .error-icon {
            font-size: 50px;
            color: #ccc;
            margin-bottom: 10px;
        }
        .error-text-main {
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .error-text-sub {
            font-size: 12px;
            line-height: 1.4;
        }

        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #fff; border-top: 1px solid #d2d2d2; display: flex; z-index: 30000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #606060; font-size: 10px; }
        .material-icons-outlined { vertical-align: middle; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="location.reload()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo-img"></div>
    <div><span class="material-icons-outlined" style="font-size:24px;">search</span></div>
</div>

<div id="main-view" class="error-container" onclick="location.reload()">
    <span class="material-icons-outlined error-icon">error</span>
    <div class="error-text-main">読み込みエラー</div>
    <div class="error-text-sub">再試行するにはタップしてください</div>
</div>

<div class="tab-bar">
    <div class="tab-item" onclick="location.reload()"><span class="material-icons-outlined">home</span><span>ホーム</span></div>
    <div class="tab-item" onclick="location.reload()"><span class="material-icons-outlined">local_fire_department</span><span>人気</span></div>
    <div class="tab-item" onclick="location.reload()"><span class="material-icons-outlined">subscriptions</span><span>登録済</span></div>
</div>

<script>
    window.onload = function() {
        console.log("API Connection Failed: Error 153");
    };
</script>

</body>
</html>
