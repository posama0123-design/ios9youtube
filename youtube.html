<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Fullscreen Launch</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="image_14fcbc.png">
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; cursor: pointer; }
    </style>
</head>
<body id="btn">

    <div>画面をタップしてYouTubeを全画面で起動</div>

    <script>
        document.getElementById('btn').addEventListener('click', () => {
            const doc = document.documentElement;
            
            // 全画面化のリクエスト
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) {
                doc.webkitRequestFullscreen();
            }

            // 全画面化の直後に、YouTubeへリダイレクト
            setTimeout(() => {
                window.location.href = "https://m.youtube.com";
            }, 100); 
        });
    </script>
</body>
</html>
