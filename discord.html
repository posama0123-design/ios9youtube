<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Legacy</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #36393f; color: #dcddde; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ヘッダー */
        .chat-header { height: 48px; background: #36393f; border-bottom: 1px solid #202225; display: flex; align-items: center; padding: 0 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-weight: bold; color: #fff; }
        .hash { color: #8e9297; margin-right: 8px; font-size: 20px; }

        /* チャットエリア */
        .message-list { flex: 1; overflow-y: scroll; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .msg-item { padding: 8px 16px; display: flex; flex-direction: column; }
        .msg-item:hover { background: rgba(4, 4, 5, 0.07); }
        .msg-header { display: flex; align-items: baseline; margin-bottom: 2px; }
        .msg-user { color: #fff; font-weight: bold; font-size: 14px; margin-right: 8px; }
        .msg-time { color: #72767d; font-size: 10px; }
        .msg-text { font-size: 14px; color: #dcddde; line-height: 1.4; word-wrap: break-word; }

        /* 入力エリア */
        .input-container { padding: 0 16px 20px 16px; background: #36393f; }
        .input-box { background: #40444b; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; }
        .input-box input { background: transparent; border: none; color: #dcddde; flex: 1; outline: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="chat-header">
    <span class="hash">#</span> general
</div>

<div class="message-list" id="msg-list">
    </div>

<div class="input-container">
    <div class="input-box">
        <input type="text" id="chat-input" placeholder="#general へのメッセージ" onkeypress="if(event.keyCode===13){sendMsg();}">
    </div>
</div>

<script>
    // --- Firebase設定 (soumanoさんの設定) ---
    var firebaseConfig = {
        apiKey: "AIzaSyCAq7RfWRTYScs4cCVcnkRdmy5lSsuHYgU",
        authDomain: "my-chatapp-7a4db.firebaseapp.com",
        databaseURL: "https://my-chatapp-7a4db-default-rtdb.firebaseio.com",
        projectId: "my-chatapp-7a4db",
        storageBucket: "my-chatapp-7a4db.firebasestorage.app",
        messagingSenderId: "211651956147",
        appId: "1:211651956147:web:fbd3b472e9ee6381460fc6"
    };

    // 初期化
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // 固定名
    var MY_NAME = "soumano";

    // 受信
    db.ref('messages').limitToLast(30).on('value', function(snapshot) {
        var list = document.getElementById('msg-list');
        list.innerHTML = '';
        snapshot.forEach(function(child) {
            var data = child.val();
            var date = new Date(data.timestamp || Date.now());
            var timeStr = date.getHours() + ":" + ("0" + date.getMinutes()).slice(-2);
            
            var item = document.createElement('div');
            item.className = 'msg-item';
            item.innerHTML = '<div class="msg-header">' +
                             '<span class="msg-user">' + data.user + '</span>' +
                             '<span class="msg-time">今日 ' + timeStr + '</span>' +
                             '</div>' +
                             '<div class="msg-text">' + data.text + '</div>';
            list.appendChild(item);
        });
        list.scrollTop = list.scrollHeight;
    });

    // 送信
    function sendMsg() {
        var input = document.getElementById('chat-input');
        var text = input.value;
        if (text.length > 0) {
            db.ref('messages').push({
                user: MY_NAME,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = '';
            // 4sのキーボード対策
            setTimeout(function(){ window.scrollTo(0, 0); }, 10);
        }
    }
</script>
</body>
</html>
