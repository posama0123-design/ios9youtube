<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #7494c0; margin: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .chat-header { height: 45px; background: #354961; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; position: fixed; top: 0; width: 100%; z-index: 10; border-bottom: 0.5px solid #2a3a4d; }
        .message-list { flex: 1; overflow-y: scroll; padding: 60px 10px 70px; -webkit-overflow-scrolling: touch; }
        .msg-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .msg-content { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg-left { align-items: flex-start; }
        .msg-left .msg-content { background: #fff; color: #000; margin-left: 5px; }
        .msg-user { font-size: 10px; color: #fff; margin-bottom: 2px; margin-left: 8px; }
        .msg-right { align-items: flex-end; }
        .msg-right .msg-content { background: #85e249; color: #000; margin-right: 5px; }
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 8px; background: #f5f5f5; display: flex; box-sizing: border-box; border-top: 0.5px solid #ccc; }
        .input-box { flex: 1; border: 1px solid #ccc; border-radius: 18px; padding: 6px 12px; font-size: 16px; outline: none; background: #fff; }
        .send-btn { margin-left: 8px; background: #007aff; color: #fff; border: none; border-radius: 18px; padding: 0 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="chat-header"># soumano_group</div>
<div class="message-list" id="msg-list"></div>

<div class="input-area">
    <input type="text" id="chat-input" class="input-box" placeholder="メッセージを入力" onkeypress="if(event.keyCode===13){sendMsg();}">
    <button class="send-btn" onclick="sendMsg()">送信</button>
</div>

<script>
    // --- 提供されたFirebase設定をレトロ環境用に適用 ---
    var firebaseConfig = {
        apiKey: "AIzaSyCAq7RfWRTYScs4cCVcnkRdmy5lSsuHYgU",
        authDomain: "my-chatapp-7a4db.firebaseapp.com",
        databaseURL: "https://my-chatapp-7a4db-default-rtdb.firebaseio.com",
        projectId: "my-chatapp-7a4db",
        storageBucket: "my-chatapp-7a4db.firebasestorage.app",
        messagingSenderId: "211651956147",
        appId: "1:211651956147:web:fbd3b472e9ee6381460fc6"
    };

    // 初期化 (varを使用)
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // 名前は「soumano」で固定
    var MY_NAME = "soumano";

    // データ受信
    db.ref('messages').limitToLast(20).on('value', function(snapshot) {
        var list = document.getElementById('msg-list');
        list.innerHTML = '';
        snapshot.forEach(function(child) {
            var data = child.val();
            var isMe = (data.user === MY_NAME);
            
            var row = document.createElement('div');
            row.className = isMe ? 'msg-row msg-right' : 'msg-row msg-left';
            
            var html = '';
            if (!isMe) {
                html += '<span class="msg-user">' + data.user + '</span>';
            }
            html += '<div class="msg-content">' + data.text + '</div>';
            
            row.innerHTML = html;
            list.appendChild(row);
        });
        // 一番下までスクロール
        list.scrollTop = list.scrollHeight;
    });

    // 送信
    function sendMsg() {
        var input = document.getElementById('chat-input');
        var val = input.value;
        if (val.length > 0) {
            db.ref('messages').push({
                user: MY_NAME,
                text: val,
                timestamp: Date.now()
            });
            input.value = '';
            // 4sのキーボード対策
            setTimeout(function(){ window.scrollTo(0, 0); }, 10);
        }
    }
</script>
</body>
</html>
