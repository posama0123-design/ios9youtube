<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>メッセージ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #fff; margin: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 44px; background: #f8f8f8; border-bottom: 0.5px solid #b2b2b2; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; flex-shrink: 0; }
        .header-btn { color: #007aff; font-size: 16px; cursor: pointer; }
        .header-title { font-weight: bold; font-size: 17px; }

        /* リスト画面 */
        #list-screen { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        .thread-item { padding: 12px 15px; border-bottom: 0.5px solid #c8c7cc; display: flex; align-items: center; }
        .thread-name { font-weight: bold; font-size: 16px; }

        /* トーク画面 */
        #chat-screen { flex: 1; display: none; flex-direction: column; }
        .message-area { flex: 1; overflow-y: scroll; padding: 10px; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; }
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 18px; font-size: 15px; margin-bottom: 8px; line-height: 1.4; word-wrap: break-word; }
        .bubble-me { background: #007aff; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble-you { background: #e5e5ea; color: #000; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* 入力エリア */
        .input-bar { border-top: 0.5px solid #b2b2b2; padding: 8px; background: #f8f8f8; display: flex; align-items: center; }
        .input-field { flex: 1; background: #fff; border: 0.5px solid #b2b2b2; border-radius: 15px; padding: 5px 12px; font-size: 16px; outline: none; }
        .photo-btn { font-size: 24px; color: #8e8e93; margin-right: 10px; cursor: pointer; }
        .send-btn { margin-left: 8px; color: #007aff; font-weight: bold; border: none; background: none; font-size: 16px; }
        
        /* 隠しファイル入力 */
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed;inset:0;background:#efeff4;z-index:1000;display:flex;align-items:center;justify-content:center;">
    <div style="width:85%;background:#fff;border-radius:10px;padding:20px;">
        <h2 style="text-align:center;margin-top:0">ログイン</h2>
        <input type="text" id="auth-user" placeholder="ユーザー名" style="width:100%;padding:10px;margin-bottom:10px;box-sizing:border-box;">
        <input type="password" id="auth-pass" placeholder="パスワード" style="width:100%;padding:10px;margin-bottom:10px;box-sizing:border-box;">
        <button onclick="handleAuth()" style="width:100%;padding:10px;background:#4cd964;color:#fff;border:none;border-radius:5px;">開始</button>
    </div>
</div>

<div id="list-screen">
    <div class="header">
        <div class="header-btn" onclick="location.reload()">編集</div>
        <div class="header-title">メッセージ</div>
        <div class="header-btn" onclick="addNewContact()">新規</div>
    </div>
    <div id="thread-list"></div>
</div>

<div id="chat-screen">
    <div class="header">
        <div class="header-btn" onclick="showList()">＜ 戻る</div>
        <div class="header-title" id="chat-with-name">相手</div>
        <div style="width:40px"></div>
    </div>
    <div class="message-area" id="msg-area"></div>
    <div class="input-bar">
        <label for="file-input" class="photo-btn">📷</label>
        <input type="file" id="file-input" accept="image/*" onchange="sendImage(this)">
        <input type="text" id="chat-input" class="input-field" placeholder="iMessage" onkeypress="if(event.keyCode===13)sendMsg()">
        <button class="send-btn" onclick="sendMsg()">送信</button>
    </div>
</div>

<script>
    var firebaseConfig = {
        apiKey: "AIzaSyCAq7RfWRTYScs4cCVcnkRdmy5lSsuHYgU",
        databaseURL: "https://my-chatapp-7a4db-default-rtdb.firebaseio.com",
        projectId: "my-chatapp-7a4db"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    var myName = localStorage.getItem('chat_user');
    var currentTarget = "";

    if (myName) { document.getElementById('auth-screen').style.display = 'none'; loadThreads(); }

    function handleAuth() {
        var user = document.getElementById('auth-user').value.trim();
        var pass = document.getElementById('auth-pass').value.trim();
        if(!user || !pass) return;
        db.ref('users/' + user).once('value', function(snap){
            if(snap.exists() && snap.val().password !== pass) return alert("パスワード不一致");
            db.ref('users/' + user).set({password: pass});
            myName = user; localStorage.setItem('chat_user', user);
            document.getElementById('auth-screen').style.display = 'none';
            loadThreads();
        });
    }

    // ★新規ユーザー追加機能
    function addNewContact() {
        var target = prompt("追加したいユーザー名を入力してください");
        if (!target || target === myName) return;
        db.ref('users/' + target).once('value', function(snap){
            if(snap.exists()) openChat(target);
            else alert("そのユーザーは見つかりません");
        });
    }

    function loadThreads() {
        db.ref('rooms').on('value', function(snap){
            var list = document.getElementById('thread-list');
            list.innerHTML = '';
            snap.forEach(function(room){
                var users = room.key.split('_');
                if(users.indexOf(myName) !== -1){
                    var other = users[0] === myName ? users[1] : users[0];
                    var div = document.createElement('div');
                    div.className = 'thread-item';
                    div.onclick = function(){ openChat(other); };
                    div.innerHTML = '<div class="thread-name">' + other + '</div>';
                    list.appendChild(div);
                }
            });
        });
    }

    function openChat(other) {
        currentTarget = other;
        document.getElementById('chat-with-name').innerText = other;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        var roomId = [myName, other].sort().join('_');
        db.ref('rooms/' + roomId).on('value', function(snap){
            var area = document.getElementById('msg-area'); area.innerHTML = '';
            snap.forEach(function(msg){
                var data = msg.val();
                var bubble = document.createElement('div');
                bubble.className = 'bubble ' + (data.user === myName ? 'bubble-me' : 'bubble-you');
                if(data.type === 'image') {
                    bubble.innerHTML = '<img src="' + data.text + '" class="sent-img">';
                } else {
                    bubble.innerText = data.text;
                }
                area.appendChild(bubble);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        var input = document.getElementById('chat-input');
        if(!input.value) return;
        postToFirebase(input.value, 'text');
        input.value = '';
    }

    // ★画像送信機能（Base64変換）
    function sendImage(input) {
        var file = input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
            postToFirebase(e.target.result, 'image');
        };
        reader.readAsDataURL(file);
    }

    function postToFirebase(content, type) {
        var roomId = [myName, currentTarget].sort().join('_');
        db.ref('rooms/' + roomId).push({ user: myName, text: content, type: type, time: Date.now() });
    }

    function showList() { document.getElementById('list-screen').style.display = 'block'; document.getElementById('chat-screen').style.display = 'none'; }
</script>
</body>
</html>
