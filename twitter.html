<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="image_14fcbc.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>Twitter</title>
    <style>
        /* iOS 9風：清潔感のある白と細いライン */
        body { background: #fff; font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 45px; padding-bottom: 50px; }
        
        /* iOS 9スタイルのヘッダー */
        .header { 
            position: fixed; top: 0; width: 100%; height: 45px; 
            background: #fff; display: flex; align-items: center; 
            padding: 0 10px; box-sizing: border-box; z-index: 1000; 
            border-bottom: 0.5px solid #bdc3c7;
        }
        .search-bar {
            flex: 1; background: #e1e8ed; border-radius: 5px;
            height: 28px; display: flex; align-items: center; padding: 0 8px;
            margin: 0 10px; color: #657786; font-size: 13px;
        }
        .search-bar input {
            background: transparent; border: none; width: 100%; outline: none;
            font-size: 13px; color: #14171a;
        }

        /* タイムライン */
        .tweet-item { 
            display: flex; padding: 12px; border-bottom: 0.5px solid #e1e8ed; 
            text-decoration: none; color: inherit;
        }

        .avatar { width: 42px; height: 42px; border-radius: 5px; background: #1da1f2; margin-right: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        
        .content { flex: 1; }
        .user-row { margin-bottom: 2px; }
        .name { font-weight: bold; font-size: 14px; color: #14171a; }
        .screen-name { color: #657786; font-size: 13px; margin-left: 2px; }
        .text { font-size: 14px; color: #14171a; line-height: 1.3; margin-top: 2px; }

        /* アクション */
        .actions { display: flex; margin-top: 10px; justify-content: space-between; max-width: 250px; color: #8899a6; }
        .actions span { font-size: 18px; }

        /* iOS 9風タブバー */
        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: rgba(255,255,255,0.95); display: flex; 
            border-top: 0.5px solid #bdc3c7; -webkit-backdrop-filter: blur(10px);
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8899a6; font-size: 10px; }
        .tab-item.active { color: #1da1f2; }
    </style>
</head>
<body>

<div class="header">
    <span class="material-icons-outlined" style="color:#1da1f2; font-size:24px;">account_circle</span>
    <div class="search-bar">
        <span class="material-icons-outlined" style="font-size:16px; margin-right:5px;">search</span>
        <input type="text" id="search-input" placeholder="Twitterを検索" onkeypress="handleSearch(event)">
    </div>
    <span class="material-icons-outlined" style="color:#1da1f2; font-size:24px;">edit</span>
</div>

<div id="tl"></div>

<div class="tab-bar">
    <div class="tab-item active"><span class="material-icons-outlined">home</span><span>ホーム</span></div>
    <div class="tab-item"><span class="material-icons-outlined">notifications</span><span>通知</span></div>
    <div class="tab-item"><span class="material-icons-outlined">mail</span><span>メッセージ</span></div>
    <div class="tab-item"><span class="material-icons-outlined">person</span><span>プロフィール</span></div>
</div>

<script>
    function handleSearch(e) {
        if (e.key === 'Enter') {
            const query = document.getElementById('search-input').value;
            fetchNews(query);
            document.activeElement.blur(); // キーボードを閉じる
        }
    }

    function fetchNews(query = '') {
        const tl = document.getElementById('tl');
        tl.innerHTML = '<div style="padding:20px; text-align:center; color:#657786;">検索中...</div>';

        // クエリがある場合は検索、ない場合はトップニュース
        const searchPath = query ? `&q=${encodeURIComponent(query)}` : '';
        const rssUrl = encodeURIComponent(`https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja${searchPath}`);
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                let html = '';
                if (!data.items || data.items.length === 0) {
                    html = '<div style="padding:20px; text-align:center;">見つかりませんでした</div>';
                } else {
                    data.items.forEach(item => {
                        const source = item.author || "News";
                        html += `
                            <a href="${item.link}" class="tweet-item" target="_blank">
                                <div class="avatar">${source.substring(0,1)}</div>
                                <div class="content">
                                    <div class="user-row"><span class="name">${source}</span><span class="screen-name">@news_bot</span></div>
                                    <div class="text">${item.title}</div>
                                    <div class="actions">
                                        <span class="material-icons-outlined">chat_bubble_outline</span>
                                        <span class="material-icons-outlined">autorenew</span>
                                        <span class="material-icons-outlined">favorite_border</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    });
                }
                tl.innerHTML = html;
            })
            .catch(() => {
                tl.innerHTML = '<div style="padding:20px; text-align:center;">エラーが発生しました</div>';
            });
    }

    window.onload = () => fetchNews();
</script>

</body>
</html>
