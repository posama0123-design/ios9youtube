<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Twitter">
    <link rel="apple-touch-icon" href="twitter_image.png">
    <link rel="manifest" href="manifest_tw.json">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>Twitter</title>
    <style>
        body { background: #fff; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 45px; padding-bottom: 50px; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
        .header { position: fixed; top: 0; width: 100%; height: 45px; background: #fff; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 1000; border-bottom: 0.5px solid #bdc3c7; }
        .header-title { flex: 1; text-align: center; font-size: 17px; font-weight: bold; color: #14171a; }
        .search-container { padding: 8px 10px; background: #f5f8fa; border-bottom: 0.5px solid #e1e8ed; display: none; }
        .search-box { background: #e1e8ed; border-radius: 5px; height: 30px; display: flex; align-items: center; padding: 0 8px; }
        .search-box input { background: transparent; border: none; width: 100%; outline: none; font-size: 14px; color: #14171a; }
        .tweet-item { display: block; padding: 12px; border-bottom: 0.5px solid #e1e8ed; text-decoration: none; color: inherit; overflow: hidden; }
        .avatar { width: 42px; height: 42px; border-radius: 5px; background: #1da1f2; float: left; margin-right: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 18px; }
        .content { overflow: hidden; }
        .name { font-weight: bold; font-size: 14px; color: #14171a; }
        .screen-name { color: #657786; font-size: 13px; }
        .text { font-size: 14px; color: #14171a; line-height: 1.3; margin-top: 2px; }
        .actions { display: flex; margin-top: 10px; justify-content: space-between; max-width: 200px; color: #8899a6; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 50px; background: #fff; display: flex; border-top: 0.5px solid #bdc3c7; z-index: 1000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8899a6; font-size: 10px; text-decoration: none; }
        .tab-item.active { color: #1da1f2; }
    </style>
</head>
<body>

<div class="header">
    <span class="material-icons-outlined" style="color:#1da1f2; font-size:24px;">account_circle</span>
    <div class="header-title" id="page-title">ホーム</div>
    <span class="material-icons-outlined" style="color:#1da1f2; font-size:24px;">edit</span>
</div>

<div class="search-container" id="search-section">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="検索ワードを入力して決定" onkeypress="if(event.keyCode===13){fetchNews(this.value); this.blur();}">
    </div>
</div>

<div id="tl"></div>

<div class="tab-bar">
    <div id="tab-home" class="tab-item active" onclick="switchTab('home')"><span class="material-icons-outlined">home</span><span>ホーム</span></div>
    <div id="tab-search" class="tab-item" onclick="switchTab('search')"><span class="material-icons-outlined">search</span><span>検索</span></div>
    <div id="tab-mail" class="tab-item" onclick="switchTab('mail')"><span class="material-icons-outlined">mail</span><span>メッセージ</span></div>
    <div id="tab-person" class="tab-item" onclick="switchTab('person')"><span class="material-icons-outlined">person</span><span>プロフィール</span></div>
</div>

<script>
    // iOS 9Safariは「=>」や「let/const」を理解できないため、すべて「function」と「var」で記述
    function fetchNews(query) {
        var searchQuery = query || '';
        var tl = document.getElementById('tl');
        tl.innerHTML = '<div style="padding:40px; text-align:center; color:#657786;">読み込み中...</div>';

        // プロキシ経由でRSSを取得
        var rssUrl = encodeURIComponent('https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja' + (searchQuery ? '&q=' + encodeURIComponent(searchQuery) : ''));
        var apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + rssUrl;

        var xhr = new XMLHttpRequest();
        xhr.open('GET', apiUrl, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    var items = data.items;
                    var html = '';
                    
                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        var sourceName = "News";
                        var parts = item.title.split(' - ');
                        if (parts.length > 1) {
                            sourceName = parts.pop();
                        }
                        var titleText = parts.join(' - ');

                        // 文字列連結を「+」で行う（iOS 9の安全策）
                        html += '<a href="' + item.link + '" class="tweet-item" target="_blank">' +
                                '<div class="avatar">' + sourceName.substring(0,1) + '</div>' +
                                '<div class="content">' +
                                '<div class="user-row"><span class="name">' + sourceName + '</span> <span class="screen-name"> @news_bot</span></div>' +
                                '<div class="text">' + titleText + '</div>' +
                                '<div class="actions">' +
                                '<span class="material-icons-outlined" style="font-size:18px;">chat_bubble_outline</span>' +
                                '<span class="material-icons-outlined" style="font-size:18px;">autorenew</span>' +
                                '<span class="material-icons-outlined" style="font-size:18px;">favorite_border</span>' +
                                '</div></div></a>';
                    }
                    tl.innerHTML = html;
                } else {
                    tl.innerHTML = '<div style="padding:20px; text-align:center; color:red;">エラーが発生しました<br>通信環境を確認してください</div>';
                }
            }
        };
        xhr.send();
    }

    function switchTab(type) {
        // activeクラスの切り替え
        var tabs = ['home', 'search', 'mail', 'person'];
        for (var j = 0; j < tabs.length; j++) {
            document.getElementById('tab-' + tabs[j]).className = 'tab-item';
        }
        var currentTabId = (type === 'home' || type === 'search' || type === 'mail' || type === 'person') ? 'tab-' + type : 'tab-home';
        document.getElementById(currentTabId).className = 'tab-item active';

        var searchSection = document.getElementById('search-section');
        var pageTitle = document.getElementById('page-title');

        if (type === 'search') {
            searchSection.style.display = 'block';
            pageTitle.innerText = '検索';
        } else {
            searchSection.style.display = 'none';
            pageTitle.innerText = (type === 'home' ? 'ホーム' : (type === 'mail' ? 'メッセージ' : 'プロフィール'));
            if (type === 'home') fetchNews('');
        }
    }

    window.onload = function() {
        fetchNews('');
    };
</script>
</body>
</html>
