<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest_yt.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="youtube.png">
    <title>YouTube Legacy</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: "Roboto", sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { height: 48px; background: #0f0f0f; display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 18px; margin-right: 10px; flex-shrink: 0; }
        .search-box { flex: 1; background: #2a2a2a; border-radius: 20px; padding: 5px 15px; border: 1px solid #3d3d3d; display: flex; }
        .search-input { background: transparent; border: none; color: #fff; font-size: 14px; outline: none; width: 100%; }
        
        .video-list { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        .video-item { margin-bottom: 20px; text-decoration: none; color: #fff; display: block; }
        .video-thumbnail { width: 100%; aspect-ratio: 16/9; background-color: #2a2a2a; background-size: cover; background-position: center; }
        .video-info { padding: 12px; display: flex; gap: 10px; }
        .video-title { font-size: 14px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 12px; color: #aaa; margin-top: 4px; }

        /* 再生用オーバーレイ */
        #player-overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1000; }
        .player-header { height: 44px; display: flex; align-items: center; padding: 0 15px; background: #0f0f0f; }
        #player-container { width: 100%; aspect-ratio: 16/9; }

        .bottom-nav { height: 48px; border-top: 1px solid #2a2a2a; display: flex; justify-content: space-around; align-items: center; font-size: 10px; color: #aaa; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><span style="color:red">▶</span></div>
    <div class="search-box">
        <input type="text" id="search-q" class="search-input" placeholder="YouTubeを検索" onkeypress="if(event.keyCode===13)searchVideos()">
    </div>
</div>

<div class="video-list" id="video-results">
    </div>

<div id="player-overlay">
    <div class="player-header"><button onclick="closePlayer()" style="background:none;border:none;color:#fff;font-size:20px;">✕</button></div>
    <div id="player-container"></div>
    <div id="playing-info" style="padding:15px;"></div>
</div>

<div class="bottom-nav">
    <span>🏠 ホーム</span><span>🩳 Shorts</span><span>🔔 登録</span><span>👤 あなた</span>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const API_KEY = "AIzaSyCDseE0EZTBBzTz-6oDac7QENwW9M0zOyw";
    let player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-container', { height: '100%', width: '100%', playerVars: { 'playsinline': 1 } });
    }

    async function searchVideos() {
        const q = document.getElementById('search-q').value;
        if (!q) return;
        
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(q)}&type=video&key=${API_KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            displayResults(data.items);
        } catch (e) { alert("検索に失敗しました"); }
    }

    function displayResults(items) {
        const container = document.getElementById('video-results');
        container.innerHTML = '';
        items.forEach(item => {
            const v = item.snippet;
            const id = item.id.videoId;
            const div = document.createElement('div');
            div.className = 'video-item';
            div.onclick = () => playVideo(id, v.title, v.channelTitle);
            div.innerHTML = `
                <div class="video-thumbnail" style="background-image:url('${v.thumbnails.medium.url}')"></div>
                <div class="video-info">
                    <div>
                        <div class="video-title">${v.title}</div>
                        <div class="video-meta">${v.channelTitle}</div>
                    </div>
                </div>`;
            container.appendChild(div);
        });
    }

    function playVideo(id, title, channel) {
        document.getElementById('player-overlay').style.display = 'flex';
        player.loadVideoById(id);
        document.getElementById('playing-info').innerHTML = `<div class="video-title">${title}</div><div class="video-meta">${channel}</div>`;
    }

    function closePlayer() {
        player.stopVideo();
        document.getElementById('player-overlay').style.display = 'none';
    }
    
    // 初期表示としてトレンドっぽいのを出す
    window.onload = () => { document.getElementById('search-q').value = "ゆっくり実況"; searchVideos(); };
</script>
</body>
</html>
