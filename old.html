<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="image_14fcbc.png?v=fixed_final">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>YouTube</title>
    <style>
        body { background: #f1f1f1; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 52px; padding-bottom: 50px; overflow-x: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 52px; background: #fff; border-bottom: 1px solid #e2e2e2; z-index: 10000; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; }
        .logo-img { height: 18px; }
        .video-item { background: #fff; border-bottom: 8px solid #f1f1f1; }
        .thumb-cont { width: 100%; position: relative; padding-top: 56.25%; background: #000; }
        .thumb-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .v-detail { padding: 12px; display: flex; }
        .v-avatar { width: 36px; height: 36px; border-radius: 18px; margin-right: 12px; background: #eee; flex-shrink: 0; overflow: hidden; }
        .v-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .v-title { font-size: 14px; font-weight: bold; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { font-size: 11px; color: #606060; margin-top: 4px; }
        
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 20000; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .player-fixed-cont { position: sticky; top: 0; z-index: 20001; background: #000; }
        
        .action-bar { display: flex; justify-content: space-around; padding: 12px 0; border-bottom: 1px solid #eee; }
        .action-btn { display: flex; flex-direction: column; align-items: center; color: #606060; font-size: 10px; flex: 1; }
        .action-btn .material-icons-outlined { font-size: 22px; margin-bottom: 4px; }

        /* 説明文の開閉 */
        .video-desc-area { padding: 12px; font-size: 12px; color: #333; line-height: 1.5; border-bottom: 1px solid #eee; background: #fafafa; }
        #p-description { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; white-space: pre-wrap; }
        #p-description.open { display: block; overflow: visible; }
        .desc-toggle { color: #065fd4; font-weight: bold; margin-top: 5px; cursor: pointer; display: block; }

        /* コメント欄強化 */
        .comment-row { display: flex; padding: 12px; border-bottom: 1px solid #eee; }
        .c-avatar { width: 32px; height: 32px; border-radius: 16px; background: #eee; margin-right: 12px; flex-shrink: 0; overflow: hidden; }
        .c-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .c-content { flex: 1; font-size: 13px; }
        .c-user { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .c-actions { display: flex; gap: 15px; margin-top: 10px; color: #606060; }
        .c-actions .material-icons-outlined { font-size: 16px; }

        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #fff; border-top: 1px solid #d2d2d2; display: flex; z-index: 30000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #606060; font-size: 10px; }
        
        .material-icons-outlined { vertical-align: middle; cursor: pointer; }
        .ch-header { position: sticky; top: 0; background: #fff; z-index: 20002; display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="location.reload()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo-img"></div>
    <div>
        <span class="material-icons-outlined" style="font-size:24px;" onclick="doSearch()">search</span>
    </div>
</div>

<div id="main-view"></div>

<div id="channel-page" class="full-page">
    <div class="ch-header">
        <span class="material-icons-outlined" onclick="closeChannel()" style="margin-right:20px;">arrow_back</span>
        <span id="ch-header-title" style="font-weight:bold; font-size:16px;">チャンネル</span>
    </div>
    <div style="padding:20px; text-align:center; background:#fafafa; border-bottom:1px solid #eee;">
        <div id="ch-avatar-big" style="width:60px; height:60px; border-radius:30px; background:#ccc; margin:0 auto 10px; overflow:hidden;"></div>
        <h2 id="ch-name" style="margin:0; font-size:18px;"></h2>
        <div style="background:#cc0000; color:#fff; padding:6px 15px; border-radius:2px; display:inline-block; margin-top:10px; font-size:13px; font-weight:bold;">登録済み</div>
    </div>
    <div id="ch-video-list"></div>
</div>

<div id="player-page" class="full-page">
    <div class="player-fixed-cont">
        <div id="yt-player-cont" style="width:100%; aspect-ratio:16/9;"></div>
    </div>
    <div style="padding:12px;">
        <p id="p-title" style="font-size:16px; font-weight:bold; margin:0;"></p>
        <p id="p-views" style="font-size:12px; color:#606060; margin:8px 0;"></p>
        <div id="p-ch-info" style="display:flex; align-items:center; margin-top:15px; padding:10px 0; border-top:1px solid #eee;"></div>
    </div>
    
    <div class="action-bar">
        <div class="action-btn"><span class="material-icons-outlined">thumb_up</span><span>高評価</span></div>
        <div class="action-btn"><span class="material-icons-outlined">thumb_down</span><span>低評価</span></div>
        <div class="action-btn"><span class="material-icons-outlined">share</span><span>共有</span></div>
        <div class="action-btn" onclick="closePlayer()"><span class="material-icons-outlined">expand_more</span><span>閉じる</span></div>
    </div>

    <div class="video-desc-area">
        <div id="p-description"></div>
        <span class="desc-toggle" id="desc-btn" onclick="toggleDesc()">...もっと見る</span>
    </div>

    <div style="padding:10px; background:#f1f1f1; font-size:14px; font-weight:bold;">コメント</div>
    <div id="real-comments" style="background:#fff;"></div>
    
    <div style="padding:10px; background:#f1f1f1; font-size:14px; font-weight:bold;">次の動画</div>
    <div id="next-videos-list"></div>
</div>

<div class="tab-bar">
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">home</span><span>ホーム</span></div>
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">local_fire_department</span><span>人気</span></div>
    <div class="tab-item" onclick="closePlayer(); closeChannel();"><span class="material-icons-outlined">subscriptions</span><span>登録済</span></div>
</div>

<script>
    var KEY = 'AIzaSyBGxeOnslbgSvN2JWq8o2tNptSFzSaY8lI';

    function ajaxGet(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) { callback(JSON.parse(xhr.responseText)); }
        };
        xhr.send();
    }

    function formatViews(num) {
        if(!num) return "";
        num = parseInt(num);
        if (num >= 10000) return (num / 10000).toFixed(1) + "万回視聴";
        return num + "回視聴";
    }

    function toggleDesc() {
        var d = document.getElementById('p-description');
        var b = document.getElementById('desc-btn');
        if(d.classList.contains('open')) {
            d.classList.remove('open');
            b.innerText = '...もっと見る';
        } else {
            d.classList.add('open');
            b.innerText = '表示を減らす';
        }
    }

    function loadHome() {
        var cats = ['1', '20', '10', '17', '24']; 
        var cat = cats[Math.floor(Math.random() * cats.length)];
        var url = 'https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&videoCategoryId='+cat+'&maxResults=10&key=' + KEY;
        renderList(url, 'main-view', true);
    }

    function doSearch() {
        var q = prompt("YouTube 検索");
        if (q) {
            var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&q='+encodeURIComponent(q)+'&type=video&maxResults=10&key='+KEY;
            renderList(url, 'main-view', false);
        }
    }

    function renderList(url, targetId, isVideoAPI) {
        var target = document.getElementById(targetId);
        target.innerHTML = '<div style="padding:20px; text-align:center;">読み込み中...</div>';
        ajaxGet(url, function(data) {
            var html = '';
            data.items.forEach(function(v) {
                var videoId = isVideoAPI ? v.id : v.id.videoId;
                if(!videoId) return;
                var chName = v.snippet.channelTitle.replace(/'/g, "");
                var viewCount = v.statistics ? formatViews(v.statistics.viewCount) : "";
                html += '<div class="video-item">' +
                        '<div class="thumb-cont" onclick="openPlayer(\''+videoId+'\')"><img src="'+v.snippet.thumbnails.high.url+'" class="thumb-img"></div>' +
                        '<div class="v-detail">' +
                        '<div class="v-avatar" onclick="openChannel(\''+v.snippet.channelId+'\')"><img src="'+v.snippet.thumbnails.default.url+'"></div>' +
                        '<div onclick="openPlayer(\''+videoId+'\')">' +
                        '<p class="v-title">'+v.snippet.title+'</p>' +
                        '<p class="v-meta">'+chName+' ・ '+viewCount+'</p></div></div></div>';
            });
            target.innerHTML = html;
        });
    }

    function openPlayer(id) {
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('player-page').scrollTop = 0;
        document.getElementById('p-description').classList.remove('open');
        document.getElementById('desc-btn').innerText = '...もっと見る';
        document.getElementById('yt-player-cont').innerHTML = '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>';
        
        ajaxGet('https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id='+id+'&key='+KEY, function(data) {
            var v = data.items[0];
            document.getElementById('p-title').innerText = v.snippet.title;
            document.getElementById('p-views').innerText = formatViews(v.statistics.viewCount);
            document.getElementById('p-description').innerText = v.snippet.description || "説明はありません。";
            
            ajaxGet('https://www.googleapis.com/youtube/v3/channels?part=snippet&id='+v.snippet.channelId+'&key='+KEY, function(chData) {
                var ch = chData.items[0];
                document.getElementById('p-ch-info').innerHTML = 
                    '<div class="v-avatar" onclick="openChannel(\''+ch.id+'\')"><img src="'+ch.snippet.thumbnails.default.url+'"></div>' +
                    '<div onclick="openChannel(\''+ch.id+'\')"><p style="margin:0; font-size:14px; font-weight:bold;">'+ch.snippet.title+'</p></div>';
            });
        });

        ajaxGet('https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId='+id+'&maxResults=5&key='+KEY, function(data) {
            var html = '';
            if(data.items) {
                data.items.forEach(function(item) {
                    var c = item.snippet.topLevelComment.snippet;
                    html += '<div class="comment-row">' +
                            '<div class="c-avatar"><img src="'+c.authorProfileImageUrl+'"></div>' +
                            '<div class="c-content">' +
                            '<div class="c-user">'+c.authorDisplayName+'</div>' +
                            '<div>'+c.textDisplay+'</div>' +
                            '<div class="c-actions">' +
                            '<span class="material-icons-outlined">thumb_up</span>' +
                            '<span class="material-icons-outlined">thumb_down</span>' +
                            '<span class="material-icons-outlined">chat_bubble_outline</span>' +
                            '</div></div></div>';
                });
            }
            document.getElementById('real-comments').innerHTML = html || '<div style="padding:15px; font-size:12px; color:#606060;">コメントはオフになっています。</div>';
        });

        document.getElementById('next-videos-list').innerHTML = document.getElementById('main-view').innerHTML;
    }

    function openChannel(chId) {
        document.getElementById('channel-page').style.display = 'block';
        ajaxGet('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id='+chId+'&key='+KEY, function(data) {
            var ch = data.items[0];
            document.getElementById('ch-name').innerText = ch.snippet.title;
            document.getElementById('ch-header-title').innerText = ch.snippet.title;
            document.getElementById('ch-avatar-big').innerHTML = '<img src="'+ch.snippet.thumbnails.medium.url+'" style="width:100%; height:100%; object-fit:cover;">';
            renderList('https://www.googleapis.com/youtube/v3/search?part=snippet&channelId='+chId+'&type=video&order=date&maxResults=10&key='+KEY, 'ch-video-list', false);
        });
    }

    function closePlayer() { document.getElementById('player-page').style.display = 'none'; document.getElementById('yt-player-cont').innerHTML = ''; }
    function closeChannel() { document.getElementById('channel-page').style.display = 'none'; }

    window.onload = loadHome;
</script>
</body>
</html>
