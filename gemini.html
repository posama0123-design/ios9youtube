<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini iOS</title>
    <style>
        /* 前回のデザインを維持（iOS 9最適化） */
        body { background-color: #000; color: #fff; font-family: -apple-system, Helvetica, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #header { height: 44px; background: linear-gradient(#202020, #000); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 17px; position: fixed; top: 0; width: 100%; z-index: 100; }
        #chat-box { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding: 10px; padding-top: 54px; padding-bottom: 60px; }
        .message { display: flex; margin-bottom: 15px; max-width: 85%; }
        .user { justify-content: flex-end; margin-left: auto; }
        .user .bubble { background-color: #21ba45; border-radius: 18px 18px 0 18px; padding: 10px 15px; color: white; font-size: 15px; }
        .ai { justify-content: flex-start; }
        .ai .bubble { background-color: #1a1a1a; border: 1px solid #333; border-radius: 18px 18px 18px 0; padding: 10px 15px; color: #ececec; font-size: 15px; }
        #input-area { position: fixed; bottom: 0; width: 100%; height: 50px; background: #111; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; }
        #userInput { flex: 1; height: 36px; border-radius: 18px; border: 1px solid #444; background: #0c0c0c; color: #fff; padding: 0 15px; font-size: 16px; }
        #sendBtn { width: 44px; height: 36px; background: #333; color: #aaa; border: none; border-radius: 18px; margin-left: 10px; font-size: 20px; }
        #userInput:not(:placeholder-shown) + #sendBtn { background: #0a84ff; color: #fff; }
    </style>
</head>
<body>

    <div id="header">Gemini</div>
    <div id="chat-box">
        <div class="message ai"><div class="bubble">準備完了です。PCやiPhone 4Sから話しかけてみてください！</div></div>
    </div>
    
    <div id="input-area">
        <input type="text" id="userInput" placeholder="メッセージを入力...">
        <button id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

    <script>
        // --- ここにあなたのAPIキーを入れてください ---
        var apiKey = "AIzaSyAlBitznJc-qpRCq-FBY0HCW_egVyMjGR0";
        
        // URLの末尾に「:generateContent」があるか、余計なスペースがないか厳重チェック
        var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey;

        var chatBox = document.getElementById("chat-box");
        var userInput = document.getElementById("userInput");

        function sendMessage() {
            var text = userInput.value;
            if (!text) return;

            chatBox.innerHTML += '<div class="message user"><div class="bubble">' + text + '</div></div>';
            userInput.value = "";
            scrollToBottom();

            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        // レスポンスの解析。Googleの構造に合わせて深く指定
                        if (response.candidates && response.candidates[0].content) {
                            var aiText = response.candidates[0].content.parts[0].text;
                            chatBox.innerHTML += '<div class="message ai"><div class="bubble">' + aiText.replace(/\n/g, '<br>') + '</div></div>';
                        }
                    } else {
                        // 404が出た場合、詳細を表示
                        chatBox.innerHTML += '<div class="message ai"><div class="bubble" style="color:red">Error: ' + xhr.status + '<br>APIの設定かURLが間違っている可能性があります。</div></div>';
                    }
                    scrollToBottom();
                }
            };

            // 送信データの形式を公式ドキュメントに100%合わせる
            var data = JSON.stringify({
                "contents": [{
                    "parts": [{ "text": text }]
                }]
            });

            xhr.send(data);
        }

        function scrollToBottom() {
            setTimeout(function() { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
        }

        userInput.addEventListener("keypress", function(e) {
            if (e.which === 13) { sendMessage(); e.preventDefault(); }
        });
    </script>
</body>
</html>
