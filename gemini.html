<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Legacy</title>
    <style>
        /* iPhone 4Sの画面サイズ(320px)に最適化 */
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        #chat-box { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 5px; margin-bottom: 10px; font-size: 14px; }
        .user { color: #0f0; } /* ユーザーは緑 */
        .ai { color: #0af; }   /* AIは青 */
        input { width: 70%; padding: 10px; border: none; border-radius: 5px; }
        button { width: 25%; padding: 10px; background: #444; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h3>Gemini 4S</h3>
    <div id="chat-box"></div>
    
    <input type="text" id="userInput" placeholder="メッセージを入力...">
    <button onclick="sendMessage()">送信</button>

    <script>
        var apiKey = "AIzaSyAlBitznJc-qpRCq-FBY0HCW_egVyMjGR0";
        var chatBox = document.getElementById("chat-box");

        function sendMessage() {
            var input = document.getElementById("userInput");
            var text = input.value;
            if (!text) return;

            // ユーザーのメッセージを表示
            chatBox.innerHTML += '<div class="user"><b>You:</b> ' + text + '</div>';
            input.value = "";

            // 古いブラウザでも動くXMLHttpRequestを使用
            var xhr = new XMLHttpRequest();
            var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey;

            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        var aiText = response.candidates[0].content.parts[0].text;
                        chatBox.innerHTML += '<div class="ai"><b>Gemini:</b> ' + aiText + '</div>';
                    } else {
                        chatBox.innerHTML += '<div style="color:red">Error: ' + xhr.status + '</div>';
                    }
                    // 自動スクロール
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            };

            var data = JSON.stringify({
                "contents": [{ "parts": [{ "text": text }] }]
            });

            xhr.send(data);
        }
    </script>
</body>
</html>
