<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest_cloud.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="iCl〇UD">
    
    <link rel="apple-touch-icon" href="cloud.png">
    <link rel="icon" type="image/png" href="cloud.png">

    <title>iCl〇UD</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background: #fdf6e3; color: #657b83; font-family: "Helvetica Neue", sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ヘッダー */
        .header { height: 44px; background: #eee8d5; border-bottom: 0.5px solid #93a1a1; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 17px; }
        
        /* メモ入力エリア */
        .memo-container { flex: 1; padding: 15px; display: flex; flex-direction: column; background-image: linear-gradient(#eee8d5 1px, transparent 1px); background-size: 100% 1.6em; }
        #memo-input { 
            flex: 1; 
            width: 100%; 
            border: none; 
            background: transparent; 
            font-size: 18px; 
            line-height: 1.6; 
            resize: none; 
            outline: none; 
            color: #073642;
            font-family: inherit;
        }

        /* ツールバー */
        .toolbar { 
            height: 50px; 
            background: #eee8d5; 
            border-top: 0.5px solid #93a1a1; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .btn { color: #268bd2; font-weight: bold; cursor: pointer; font-size: 16px; border: none; background: none; }
        .status { font-size: 11px; color: #93a1a1; font-style: italic; }
    </style>
</head>
<body>

<div class="header">iCl〇UD</div>

<div class="memo-container">
    <textarea id="memo-input" placeholder="入力すると自動同期されます..."></textarea>
</div>

<div class="toolbar">
    <button class="btn" onclick="clearMemo()">全消去</button>
    <div id="status" class="status">同期完了</div>
    <button class="btn" onclick="copyMemo()">コピー</button>
</div>

<script>
    // Firebase設定
    var firebaseConfig = {
        apiKey: "AIzaSyCAq7RfWRTYScs4cCVcnkRdmy5lSsuHYgU",
        databaseURL: "https://my-chatapp-7a4db-default-rtdb.firebaseio.com",
        projectId: "my-chatapp-7a4db"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    var memoRef = db.ref('shared_memo');

    var memoInput = document.getElementById('memo-input');
    var statusText = document.getElementById('status');
    var isTyping = false;
    var typingTimer;

    // 受信：サーバーのデータが更新されたら表示を同期
    memoRef.on('value', function(snapshot) {
        if (!isTyping) {
            memoInput.value = snapshot.val() || "";
            statusText.innerText = "同期完了";
        }
    });

    // 送信：入力が止まってから保存する仕組み
    memoInput.addEventListener('input', function() {
        isTyping = true;
        statusText.innerText = "入力中...";
        
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function() {
            memoRef.set(memoInput.value, function(error) {
                if (!error) {
                    statusText.innerText = "保存済み";
                    isTyping = false;
                }
            });
        }, 500); // 0.5秒入力が止まったら送信
    });

    function clearMemo() {
        if (confirm("すべての内容を消去しますか？")) {
            memoRef.set("");
        }
    }

    function copyMemo() {
        memoInput.select();
        document.execCommand('copy');
        statusText.innerText = "コピーしました";
        setTimeout(function() { statusText.innerText = "同期完了"; }, 2000);
    }
</script>
</body>
</html>
