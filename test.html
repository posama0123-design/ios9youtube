<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="image_14fcbc.png?v=fixed_final">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>YouTube</title>
    <style>
        body { background: #f1f1f1; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding-top: 52px; padding-bottom: 50px; }
        .header { position: fixed; top: 0; width: 100%; height: 52px; background: #fff; border-bottom: 1px solid #e2e2e2; z-index: 10000; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; }
        .logo-img { height: 22px; }
        .video-item { background: #fff; border-bottom: 8px solid #f1f1f1; }
        .thumb-cont { width: 100%; position: relative; padding-top: 56.25%; background: #000; }
        .thumb-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .v-detail { padding: 12px; display: flex; }
        .v-avatar { width: 36px; height: 36px; border-radius: 18px; margin-right: 12px; background: #eee; flex-shrink: 0; overflow: hidden; }
        .v-title { font-size: 14px; font-weight: bold; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 20000; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .player-fixed-cont { position: sticky; top: 0; z-index: 20001; background: #000; }
        .action-bar { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid #eee; }
        .action-btn { display: flex; flex-direction: column; align-items: center; color: #606060; font-size: 10px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #fff; border-top: 1px solid #d2d2d2; display: flex; z-index: 30000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #606060; font-size: 10px; }

        /* 🆕 ミニプレイヤー用スタイル */
        #mini-player { display: none; position: fixed; bottom: 60px; right: 10px; width: 160px; aspect-ratio: 16/9; background: #000; z-index: 40000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; }
        #mini-close { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.5); color: #fff; padding: 2px; font-size: 16px; z-index: 40001; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="location.reload()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo-img"></div>
    <span class="material-icons-outlined" style="font-size:24px;" onclick="doSearch()">search</span>
</div>

<div id="main-view"></div>

<div id="mini-player" onclick="restorePlayer()">
    <div id="mini-close" onclick="event.stopPropagation(); stopMiniPlayer();">×</div>
    <div id="mini-video-cont" style="width:100%; height:100%;"></div>
</div>

<div id="channel-page" class="full-page">
    <div style="padding:20px; text-align:center; background:#fafafa; border-bottom:1px solid #eee;">
        <div style="width:60px; height:60px; border-radius:30px; background:#ccc; margin:0 auto 10px;"></div>
        <h2 id="ch-name" style="margin:0; font-size:18px;"></h2>
        <div style="background:#cc0000; color:#fff; padding:6px 15px; border-radius:2px; display:inline-block; margin-top:10px; font-size:13px; font-weight:bold;">登録済み</div>
    </div>
    <div id="ch-video-list"></div>
    <div style="padding:25px; text-align:center; color:#065fd4; font-weight:bold;" onclick="closeChannel()">✕ 戻る</div>
</div>

<div id="player-page" class="full-page">
    <div class="player-fixed-cont"><div id="yt-player-cont" style="width:100%; aspect-ratio:16/9;"></div></div>
    <div style="padding:12px;">
        <p id="p-title" style="font-size:16px; font-weight:bold; margin:0;"></p>
        <div id="p-ch-info" style="display:flex; align-items:center; margin-top:15px; padding:10px 0; border-top:1px solid #eee;"></div>
    </div>
    <div class="action-bar">
        <div class="action-btn"><span class="material-icons-outlined">thumb_up</span><span>高評価</span></div>
        <div class="action-btn"><span class="material-icons-outlined">thumb_down</span><span>低評価</span></div>
        <div class="action-btn" onclick="shareVideo()"><span class="material-icons-outlined">share</span><span>共有</span></div>
        <div class="action-btn" onclick="minimizePlayer()"><span class="material-icons-outlined">expand_more</span><span>閉じる</span></div>
    </div>
    <div id="real-comments" style="padding:12px; background:#fff;"></div>
    <div style="padding:10px; background:#f1f1f1; font-size:14px; font-weight:bold;">次の動画</div>
    <div id="next-videos-list"></div>
</div>

<div class="tab-bar">
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">home</span><span>ホーム</span></div>
    <div class="tab-item" onclick="loadHome()"><span class="material-icons-outlined">local_fire_department</span><span>人気</span></div>
    <div class="tab-item" onclick="closePlayer(); closeChannel();"><span class="material-icons-outlined">subscriptions</span><span>登録済</span></div>
</div>

<script>
    var KEY = 'AIzaSyBGxeOnslbgSvN2JWq8o2tNptSFzSaY8lI';
    var currentVideoId = '';

    function ajaxGet(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) { callback(JSON.parse(xhr.responseText)); }
        };
        xhr.send();
    }

    function loadHome() {
        var cats = ['1', '20', '10', '17', '24']; 
        var cat = cats[Math.floor(Math.random() * cats.length)];
        var url = 'https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=JP&videoCategoryId='+cat+'&maxResults=10&key=' + KEY;
        renderList(url, 'main-view', true);
    }

    function doSearch() {
        var q = prompt("YouTube 検索");
        if (q) {
            var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&q='+encodeURIComponent(q)+'&type=video&maxResults=10&key='+KEY;
            renderList(url, 'main-view', false);
        }
    }

    function renderList(url, targetId, isVideoAPI) {
        var target = document.getElementById(targetId);
        target.innerHTML = '<div style="padding:20px; text-align:center;">読み込み中...</div>';
        ajaxGet(url, function(data) {
            var html = '';
            for (var i = 0; i < data.items.length; i++) {
                var v = data.items[i];
                var videoId = isVideoAPI ? v.id : v.id.videoId;
                if(!videoId || typeof videoId !== 'string') continue;
                var title = v.snippet.title.replace(/'/g, "");
                var chId = v.snippet.channelId;
                var chName = v.snippet.channelTitle.replace(/'/g, "");
                
                html += '<div class="video-item">' +
                        '<div class="thumb-cont" onclick="openPlayer(\''+videoId+'\',\''+title+'\',\''+chId+'\',\''+chName+'\')"><img src="'+v.snippet.thumbnails.high.url+'" class="thumb-img"></div>' +
                        '<div class="v-detail">' +
                        '<div class="v-avatar" onclick="openChannel(\''+chId+'\',\''+chName+'\')"></div>' +
                        '<div onclick="openPlayer(\''+videoId+'\',\''+title+'\',\''+chId+'\',\''+chName+'\')">' +
                        '<p class="v-title">'+v.snippet.title+'</p>' +
                        '<p style="font-size:12px; color:#606060;">'+v.snippet.channelTitle+'</p></div></div></div>';
            }
            target.innerHTML = html;
        });
    }

    function openPlayer(id, title, chId, chName) {
        stopMiniPlayer();
        currentVideoId = id;
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-ch-info').innerHTML = 
            '<div class="v-avatar" onclick="openChannel(\''+chId+'\',\''+chName+'\')"></div>' +
            '<div onclick="openChannel(\''+chId+'\',\''+chName+'\')"><p style="margin:0; font-size:14px; font-weight:bold;">'+chName+'</p></div>';
        document.getElementById('yt-player-cont').innerHTML = '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>';
        
        ajaxGet('https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId='+id+'&maxResults=5&key='+KEY, function(data) {
            var html = '';
            if(data.items) {
                for (var i = 0; i < data.items.length; i++) {
                    var c = data.items[i].snippet.topLevelComment.snippet;
                    html += '<div style="padding:10px; border-bottom:1px solid #eee; font-size:13px;"><b>'+c.authorDisplayName+'</b><br>'+c.textDisplay+'</div>';
                }
            }
            document.getElementById('real-comments').innerHTML = html;
        });
        document.getElementById('next-videos-list').innerHTML = document.getElementById('main-view').innerHTML;
    }

    // 🆕 ミニプレイヤー化
    function minimizePlayer() {
        document.getElementById('player-page').style.display = 'none';
        document.getElementById('mini-player').style.display = 'block';
        document.getElementById('mini-video-cont').innerHTML = document.getElementById('yt-player-cont').innerHTML;
        document.getElementById('yt-player-cont').innerHTML = '';
    }

    // 🆕 ミニプレイヤーから復帰
    function restorePlayer() {
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('mini-player').style.display = 'none';
        document.getElementById('yt-player-cont').innerHTML = document.getElementById('mini-video-cont').innerHTML;
        document.getElementById('mini-video-cont').innerHTML = '';
    }

    function stopMiniPlayer() {
        document.getElementById('mini-player').style.display = 'none';
        document.getElementById('mini-video-cont').innerHTML = '';
    }

    // 🆕 共有機能
    function shareVideo() {
        var url = 'https://youtu.be/' + currentVideoId;
        if (navigator.share) {
            navigator.share({ title: document.getElementById('p-title').innerText, url: url });
        } else {
            prompt("動画リンクをコピー:", url);
        }
    }

    function openChannel(chId, chName) {
        // チャンネル移動時にミニプレイヤー化
        if(document.getElementById('player-page').style.display === 'block') minimizePlayer();
        document.getElementById('channel-page').style.display = 'block';
        document.getElementById('ch-name').innerText = chName;
        renderList('https://www.googleapis.com/youtube/v3/search?part=snippet&channelId='+chId+'&type=video&maxResults=10&key='+KEY, 'ch-video-list', false);
    }

    function closePlayer() { stopMiniPlayer(); document.getElementById('player-page').style.display = 'none'; document.getElementById('yt-player-cont').innerHTML = ''; }
    function closeChannel() { document.getElementById('channel-page').style.display = 'none'; }

    window.onload = loadHome;
</script>
</body>
</html>
