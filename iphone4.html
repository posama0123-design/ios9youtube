<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>YouTube</title>
    <style>
        /* iOS 7特有の細いフォントとフラットデザイン */
        body, html {
            margin: 0; padding: 0;
            background-color: #f1f1f1;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
        }

        /* 赤いヘッダー (iOS 7 Style) */
        #header {
            background-color: #e62117;
            height: 44px;
            width: 100%;
            position: fixed; top: 0; z-index: 100;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        #logo {
            float: left;
            padding: 10px 0 0 10px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: -1px;
        }

        #search-box {
            float: right;
            margin: 7px 10px 0 0;
        }

        #search-input {
            width: 140px;
            height: 28px;
            border: none;
            border-radius: 2px;
            padding: 0 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.9);
            -webkit-appearance: none; /* iOSの角丸を殺す */
        }

        /* 動画リスト (カード型) */
        #main-content {
            margin-top: 54px;
            padding: 0 8px;
        }

        .video-card {
            background: white;
            margin-bottom: 12px;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .thumb-wrap {
            width: 100%;
            height: 170px;
            background: #000;
            position: relative;
        }

        .thumb-wrap img { width: 100%; height: 100%; border: none; }

        .video-details {
            padding: 10px;
            position: relative;
        }

        .video-title {
            font-size: 15px;
            font-weight: 500;
            color: #222;
            line-height: 1.2;
            margin-bottom: 4px;
            display: block;
        }

        .video-meta {
            font-size: 12px;
            color: #777;
        }

        /* プレイヤー (iOS 7はインライン再生が弱いため、全画面風に) */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            z-index: 200;
        }

        #close-btn {
            position: absolute;
            top: 10px; right: 10px;
            color: white; font-size: 24px;
            z-index: 300;
            background: rgba(0,0,0,0.5);
            width: 40px; height: 40px;
            text-align: center; line-height: 40px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="header">
    <div id="logo">YouTube</div>
    <div id="search-box">
        <input type="text" id="search-input" placeholder="検索">
    </div>
</div>

<div id="player-overlay">
    <div id="close-btn">×</div>
    <div id="video-frame-container" style="width:100%; height:240px; margin-top:100px;"></div>
</div>

<div id="main-content">
    <div id="video-list"></div>
</div>

<script>
    /* --- iOS 6/7 互換 JavaScript (ES3/ES5) --- */
    var API_KEY = 'AIzaSyBGxeOnslbgSvN2JWq8o2tNptSFzSaY8lI'; // あなたのキー
    var videoList = document.getElementById('video-list');
    var overlay = document.getElementById('player-overlay');
    var frameContainer = document.getElementById('video-frame-container');

    function createCard(video) {
        var card = document.createElement('div');
        card.className = 'video-card';
        
        var snippet = video.snippet;
        var videoId = video.id.videoId || video.id;

        card.innerHTML = 
            '<div class="thumb-wrap">' +
                '<img src="' + snippet.thumbnails.high.url + '">' +
            '</div>' +
            '<div class="video-details">' +
                '<span class="video-title">' + snippet.title + '</span>' +
                '<div class="video-meta">' +
                    '<span>' + snippet.channelTitle + '</span>' +
                '</div>' +
            '</div>';

        card.onclick = function() {
            openPlayer(videoId);
        };
        return card;
    }

    function openPlayer(id) {
        overlay.style.display = 'block';
        frameContainer.innerHTML = '<iframe width="100%" height="100%" src="https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0" frameborder="0" allowfullscreen></iframe>';
    }

    document.getElementById('close-btn').onclick = function() {
        overlay.style.display = 'none';
        frameContainer.innerHTML = '';
    };

    function search(q) {
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=' + encodeURIComponent(q) + '&type=video&key=' + API_KEY;
        
        // 古典的なXMLHttpRequest
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var res = JSON.parse(xhr.responseText);
                videoList.innerHTML = '';
                for(var i=0; i<res.items.length; i++) {
                    videoList.appendChild(createCard(res.items[i]));
                }
            }
        };
        xhr.send();
    }

    document.getElementById('search-input').onkeypress = function(e) {
        if((e.keyCode || e.which) === 13) {
            search(this.value);
        }
    };

    // 初期ロード
    window.onload = function() {
        search('人気');
    };
</script>

</body>
</html>
