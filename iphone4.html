<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>YouTube Legacy</title>
    <style>
        /* --- CSS: iOS 6/7対応レイアウト --- */
        body, html { margin: 0; padding: 0; background-color: #f1f1f1; font-family: Helvetica, Arial, sans-serif; }
        #header {
            background-color: white; height: 45px; width: 100%;
            position: fixed; top: 0; left: 0; z-index: 1000;
            border-bottom: 1px solid #ccc;
        }
        #header-logo { display: inline-block; margin: 8px 0 0 8px; vertical-align: top; }
        #header-logo img { height: 24px; }
        #search-bar { display: inline-block; margin: 7px 0 0 10px; vertical-align: top; }
        #search-input { width: 160px; height: 24px; border: 1px solid #ccc; -webkit-appearance: none; }

        #content { margin-top: 50px; padding: 5px; }
        .video-item {
            background-color: white; margin-bottom: 10px; padding: 5px;
            border-bottom: 1px solid #ddd; overflow: hidden; /* clear float */
        }
        .thumb-box { float: left; width: 120px; height: 90px; position: relative; background: #000; }
        .thumb-box img { width: 100%; height: auto; }
        .video-info { margin-left: 130px; }
        .v-title { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 4px; display: block; }
        .v-meta { font-size: 11px; color: #777; }

        #player-layer {
            display: none; position: fixed; top: 45px; left: 0;
            width: 100%; height: 200px; background: #000; z-index: 2000;
        }
        #player-layer iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="header">
    <div id="header-logo"><img src="https://www.youtube.com/img/desktop/yt_1200.png"></div>
    <div id="search-bar">
        <input type="text" id="search-input" placeholder="検索...">
    </div>
</div>

<div id="player-layer"></div>

<div id="content">
    <div id="video-list"></div>
</div>

<script>
    // --- JavaScript: iOS 6/7 (ES5) 対応版 ---
    var videoListDir = document.getElementById('video-list');
    var playerLayer = document.getElementById('player-layer');
    var searchInput = document.getElementById('search-input');

    // 動画リストを描画する関数
    function renderVideos(videos) {
        videoListDir.innerHTML = ''; // リセット
        for (var i = 0; i < videos.length; i++) {
            var video = videos[i];
            var item = document.createElement('div');
            item.className = 'video-item';
            
            // レガシーCSSに合わせたHTML構造を生成
            item.innerHTML = 
                '<div class="thumb-box">' +
                    '<img src="' + video.snippet.thumbnails.medium.url + '">' +
                '</div>' +
                '<div class="video-info">' +
                    '<span class="v-title">' + video.snippet.title + '</span>' +
                    '<div class="v-meta">' +
                        '<span>' + video.snippet.channelTitle + '</span>' +
                    '</div>' +
                '</div>';
            
            // クリックイベント (クロージャ対策で関数を分離)
            (function(id) {
                item.onclick = function() {
                    playVideo(id);
                };
            })(video.id.videoId || video.id);

            videoListDir.appendChild(item);
        }
    }

    // 再生関数
    function playVideo(id) {
        playerLayer.style.display = 'block';
        playerLayer.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1" allowfullscreen></iframe>';
        window.scrollTo(0, 0); // プレイヤーが見えるように上へ移動
    }

    // API呼び出し (例: 起動時に人気動画を取得)
    // ※ ここにあなたのAPIキーを反映させてください
    var API_KEY = 'AIzaSyBGxeOnslbgSvN2JWq8o2tNptSFzSaY8lI'; 

    function fetchVideos(query) {
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=' + encodeURIComponent(query) + '&type=video&key=' + API_KEY;
        
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                renderVideos(data.items);
            }
        };
        xhr.send();
    }

    // 検索入力のイベント
    searchInput.onkeypress = function(e) {
        if (e.keyCode === 13) { // Enterキー
            fetchVideos(this.value);
        }
    };

    // 初期読み込み
    window.onload = function() {
        fetchVideos('人気');
    };
</script>

</body>
</html>
